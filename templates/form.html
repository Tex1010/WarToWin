{% extends 'base.html' %}

{% block content %}

<div class="container">

    <h2 class="text-info mb-4">{{ title }}</h2>

    <form method="POST" enctype="multipart/form-data"
          class="bg-dark p-4 rounded">

        {% csrf_token %}

        {{ form.as_p }}

        <button class="btn btn-info w-100 mt-3">
            Save
        </button>

    </form>

</div>

{% endblock %}
