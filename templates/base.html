<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
      content="width=device-width,
               initial-scale=1,
               maximum-scale=1,
               user-scalable=no">

    <title>WarToWin</title>
    <link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>

:root{
    --bg:#050507;
    --bg-soft:#0f0a0d;
    --card:#121116;
    --card-2:#17141c;
    --border:rgba(255,255,255,.08);
    --primary:#ff274b;
    --primary-soft:#ff5c78;
    --accent:#00b16a;
    --text:#ffffff;
    --muted:#a7acba;
    --glow:rgba(255,39,75,.28);
}

html{
    touch-action:manipulation;
    scroll-behavior:smooth;
}

*{
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:'Orbitron',sans-serif;
    background:
        radial-gradient(circle at top, rgba(255,39,75,.14), transparent 28%),
        radial-gradient(circle at 85% 20%, rgba(0,177,106,.08), transparent 20%),
        linear-gradient(180deg, #060507 0%, #0a090d 45%, #050507 100%);
    color:var(--text);
    padding-bottom:85px;
    overflow-x:hidden;
    min-height:100vh;
}

p,
p.text-muted{
    font-family:'Inter',sans-serif;
    color:rgba(255,255,255,.92) !important;
    line-height:1.75;
    letter-spacing:.01em;
}

small,
.form-text,
.admin-mini-note,
.section-subtitle{
    font-family:'Inter',sans-serif;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
        linear-gradient(115deg, rgba(255,255,255,.02) 0%, transparent 24%),
        radial-gradient(circle at 20% 10%, rgba(255,39,75,.08), transparent 24%);
    z-index:-2;
}

/* ========================= */
/* HERO */
/* ========================= */

.hero-glow{
    position:relative;
}

.hero-glow::before{
    content:'';
    position:absolute;
    width:300px;
    height:300px;
    background:var(--primary);
    filter:blur(120px);
    opacity:.2;
    left:50%;
    transform:translateX(-50%);
    top:-80px;
    z-index:-1;
}

/* ========================= */
/* LOGO */
/* ========================= */

.team-logo{
    transition:.3s;
    border-radius:24px;
}

.team-logo:active{
    transform:scale(.97);
}

/* ========================= */
/* CARDS */
/* ========================= */

.card{
    background:linear-gradient(180deg, rgba(20,17,25,.96), rgba(12,10,15,.96));
    border:1px solid var(--border);
    border-radius:22px;
    transition:.25s ease;
    overflow:hidden;
    box-shadow:0 18px 45px rgba(0,0,0,.22);
}

.card:active{
    transform:scale(.98);
}

.card:hover{
    border-color:rgba(255,39,75,.22);
}

/* ========================= */
/* AVATAR */
/* ========================= */

.member-avatar{
    width:80px;
    height:80px;
    object-fit:cover;
    border-radius:50%;
}

/* ========================= */
/* COUNTER */
/* ========================= */

.counter-box{
    min-width:180px;
    border-radius:20px;
}

/* ========================= */
/* TITLES */
/* ========================= */

.section-title{
    letter-spacing:2px;
    text-transform:uppercase;
    font-weight:700;
}

/* ========================= */
/* BADGES */
/* ========================= */

.badge{
    padding:8px 14px;
    border-radius:10px;
}

/* ========================= */
/* NAVBAR */
/* ========================= */

.navbar{
    backdrop-filter:blur(12px);
    background:rgba(7,6,9,.86) !important;
    border-color:rgba(255,255,255,.07) !important;
}

.navbar-brand{
    font-weight:700;
    letter-spacing:1px;
}

/* ========================= */
/* MOBILE BOTTOM NAV */
/* ========================= */

.mobile-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:70px;

    background:rgba(10,8,12,.95);

    backdrop-filter:blur(15px);

    border-top:1px solid rgba(255,255,255,.06);

    display:flex;
    justify-content:space-around;
    align-items:center;

    z-index:9999;
}

.nav-item-mobile{
    display:flex;
    flex-direction:column;
    align-items:center;

    text-decoration:none;
    color:var(--muted);

    transition:.2s;
}

.nav-item-mobile i{
    font-size:22px;
}

.nav-item-mobile small{
    font-size:11px;
    margin-top:2px;
}

.nav-item-mobile:active{
    transform:scale(.92);
}

.nav-item-mobile:hover{
    color:var(--primary);
}

/* ========================= */
/* BUTTONS */
/* ========================= */

.btn{
    border-radius:14px;
    font-weight:700;
}

.btn-info{
    background:linear-gradient(135deg, var(--primary), var(--primary-soft));
    border-color:transparent;
    color:#fff;
    box-shadow:0 14px 32px rgba(255,39,75,.18);
}

.btn-info:hover,
.btn-info:focus{
    background:linear-gradient(135deg, #ff3658, #ff758f);
    color:#fff;
}

.btn-outline-light{
    border-color:rgba(255,255,255,.18);
}

.btn-outline-light:hover{
    background:#fff;
    color:#111;
}

.text-info{
    color:var(--primary) !important;
}

.border-info{
    border-color:rgba(255,39,75,.45) !important;
}

.bg-info{
    background:linear-gradient(135deg, var(--primary), var(--primary-soft)) !important;
}

.alert{
    border-radius:18px;
}

.form-label{
    color:#f3f4f6;
    font-weight:600;
}

.form-text{
    color:var(--muted) !important;
}

.form-control,
.form-select{
    min-height:50px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.1);
    background:rgba(255,255,255,.05);
    color:#fff;
    box-shadow:none;
}

.form-control::placeholder{
    color:#97a0b3;
}

.form-control:focus,
.form-select:focus{
    background:rgba(255,255,255,.06);
    color:#fff;
    border-color:rgba(255,39,75,.55);
    box-shadow:0 0 0 .2rem rgba(255,39,75,.14);
}

textarea.form-control{
    min-height:120px;
}

.form-select option{
    color:#fff;
    background:#140f15;
}

input[type="file"].form-control{
    padding:.45rem .65rem;
    color:#eef2ff;
}

input[type="file"].form-control::file-selector-button{
    margin-right:.8rem;
    padding:.55rem .9rem;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg, var(--primary), var(--primary-soft));
    color:#fff;
    font-weight:700;
}

.table-dark{
    --bs-table-bg: transparent;
    --bs-table-striped-bg: rgba(255,255,255,.02);
    --bs-table-hover-bg: rgba(255,255,255,.03);
    --bs-table-border-color: rgba(255,255,255,.06);
    color:#f5f5f5;
}

/* ========================= */
/* SCROLLBAR */
/* ========================= */

::-webkit-scrollbar{
    width:6px;
}

::-webkit-scrollbar-thumb{
    background:var(--primary);
    border-radius:10px;
}

/* ========================= */
/* MOBILE */
/* ========================= */

@media(max-width:768px){

    .display-4{
        font-size:2rem;
    }

    .lead{
        font-size:1rem;
    }

    .card{
        margin-bottom:12px;
    }

    .container.py-5{
        padding-top:1.5rem !important;
        padding-bottom:6rem !important;
    }

    p,
    p.text-muted{
        font-size:.98rem;
        line-height:1.72;
    }

}

</style>

<body class="bg-dark text-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom d-none d-lg-flex">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            WarToWin
        </a>

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#menu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/">Accueil</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/members/">Membres</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/rules/">Règlements</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/join/">Rejoindre la Team</a>
                </li>

            </ul>

        </div>

    </div>
</nav>

<div class="container py-5">

    {% if messages %}
        <div class="mb-4">
            {% for message in messages %}
                <div class="alert {% if message.tags == 'error' %}alert-danger{% else %}alert-{{ message.tags|default:'info' }}{% endif %} border-0 shadow-sm">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    {% block content %}
    {% endblock %}

</div>

<!-- MOBILE BOTTOM NAV -->

<nav class="mobile-nav d-lg-none">

    <a href="/" class="nav-item-mobile">
        <i class="bi bi-house-fill"></i>
        <small>Home</small>
    </a>

    <a href="/members/" class="nav-item-mobile">
        <i class="bi bi-people-fill"></i>
        <small>Members</small>
    </a>

    <a href="/rules/" class="nav-item-mobile">
        <i class="bi bi-journal-text"></i>
        <small>Rules</small>
    </a>

    <a href="/join/" class="nav-item-mobile">
        <i class="bi bi-person-plus-fill"></i>
        <small>Join</small>
    </a>

    <a href="/admin-panel/" class="nav-item-mobile">
        <i class="bi bi-gear-fill"></i>
        <small>Admin</small>
    </a>

</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
